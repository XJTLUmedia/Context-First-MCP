# Smithery configuration for context-first-mcp
# https://smithery.ai/docs/build/project-config/smithery-yaml
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      llmProvider:
        type: string
        title: "LLM Provider"
        description: "Optional LLM provider for AI-powered analysis ('none' uses heuristics only)"
        enum: ["none", "openai", "anthropic"]
        default: "none"
      llmApiKey:
        type: string
        title: "LLM API Key"
        description: "API key for the selected LLM provider (optional — all 37 tools work without one)"
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'context-first-mcp'],
      env: {
        LLM_PROVIDER: config.llmProvider || 'none',
        LLM_API_KEY: config.llmApiKey || ''
      }
    })
  exampleConfig:
    llmProvider: "none"
    llmApiKey: ""
